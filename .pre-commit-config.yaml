repos:
  - repo: https://github.com/reteps/dockerfmt
    rev: v0.3.9
    hooks:
      - id: dockerfmt
        args:
          - --indent=4
          - --newline
          - --space-redirects
          - --check

  - repo: local
    hooks:
      - id: standardrb
        name: Standard Ruby
        entry: bundle exec standardrb --no-fix
        language: system
        types: [ruby]
        pass_filenames: false
